<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lagos Homs Ilupeju Scheme — Recreational Center Booking</title>
<style>
  #vb-root {
    --ink: #201d18; --paper: #FAF6EE; --paper-raised: #FFFFFF; --line: #E4DBC8;
    --moss: #4B5D3A; --moss-deep: #34412A; --gold: #C08A28; --brick: #A44A36; --muted: #8A8272;
    --font-display: 'Fraunces', Georgia, serif; --font-body: 'Inter', -apple-system, sans-serif;
    --radius: 10px;
    background: var(--paper); color: var(--ink); font-family: var(--font-body);
    min-height: 100vh; padding: 28px 20px 60px; box-sizing: border-box;
  }
  html, body { margin: 0; padding: 0; }
  #vb-root * { box-sizing: border-box; }
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap');

  #vb-root .vb-wrap { max-width: 880px; margin: 0 auto; }
  #vb-root .vb-eyebrow { font-size: 11px; letter-spacing: .14em; text-transform: uppercase; color: var(--moss); font-weight: 600; margin: 0 0 4px; }
  #vb-root h1 { font-family: var(--font-display); font-weight: 600; font-size: 30px; margin: 0 0 22px; color: var(--ink); line-height: 1.1; }

  #vb-root .vb-card { background: var(--paper-raised); border: 1px solid var(--line); border-radius: var(--radius); padding: 22px; }
  #vb-root .vb-grid { display: grid; grid-template-columns: 1.1fr 1fr; gap: 18px; }
  @media (max-width: 720px) { #vb-root .vb-grid { grid-template-columns: 1fr; } }

  #vb-root .vb-cal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  #vb-root .vb-cal-title { font-family: var(--font-display); font-size: 19px; font-weight: 600; }
  #vb-root .vb-nav-btn { background: var(--paper); border: 1px solid var(--line); border-radius: 8px; width: 40px; height: 40px; cursor: pointer; font-size: 16px; color: var(--ink); }
  #vb-root .vb-nav-btn:hover { border-color: var(--moss); }
  #vb-root .vb-dow { display: grid; grid-template-columns: repeat(7,1fr); gap: 4px; margin-bottom: 6px; }
  #vb-root .vb-dow span { text-align: center; font-size: 11px; color: var(--muted); font-weight: 600; }
  #vb-root .vb-days { display: grid; grid-template-columns: repeat(7,1fr); gap: 4px; }
  #vb-root .vb-day { aspect-ratio: 1; min-height: 38px; display: flex; align-items: center; justify-content: center; border-radius: 8px; font-size: 14px; cursor: pointer; border: 1px solid transparent; background: var(--paper); position: relative; color: var(--ink); }
  #vb-root .vb-day.empty { visibility: hidden; cursor: default; }
  #vb-root .vb-day.past { color: #C7BFA9; cursor: not-allowed; }
  #vb-root .vb-day.selected { outline: 2px solid var(--ink); outline-offset: 1px; }
  #vb-root .vb-day.approved { background: var(--brick); color: #fff; cursor: not-allowed; }
  #vb-root .vb-day.pending { background: var(--gold); color: #fff; }
  #vb-root .vb-day.today::after { content: ''; position: absolute; bottom: 4px; width: 4px; height: 4px; border-radius: 50%; background: var(--moss); }
  #vb-root .vb-legend { display: flex; gap: 14px; margin-top: 14px; flex-wrap: wrap; }
  #vb-root .vb-legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--muted); }
  #vb-root .vb-dot { width: 9px; height: 9px; border-radius: 50%; }

  #vb-root label { display: block; font-size: 12px; font-weight: 600; color: var(--moss-deep); margin: 14px 0 6px; }
  #vb-root label:first-child { margin-top: 0; }
  #vb-root .vb-caption { font-size: 11px; color: var(--muted); margin: -3px 0 6px; }
  #vb-root input[type=text], #vb-root input[type=tel], #vb-root input[type=email], #vb-root select, #vb-root textarea {
    width: 100%; border: 1px solid var(--line); border-radius: 8px; padding: 12px;
    font-family: var(--font-body); font-size: 16px; background: var(--paper); color: var(--ink);
  }
  #vb-root textarea { resize: vertical; min-height: 60px; }
  #vb-root .vb-selected-date { font-family: var(--font-display); font-size: 17px; padding: 10px 14px; background: var(--paper); border: 1px dashed var(--line); border-radius: 8px; color: var(--moss-deep); }
  #vb-root .vb-file-btn { border: 1px dashed var(--line); border-radius: 8px; padding: 14px; text-align: center; font-size: 13px; color: var(--muted); cursor: pointer; background: var(--paper); }
  #vb-root .vb-file-btn.has-file { border-color: var(--moss); color: var(--moss-deep); }
  #vb-root .vb-thumb { max-width: 100%; max-height: 140px; border-radius: 6px; margin-top: 8px; display: block; }
  #vb-root .vb-policy-note { background: var(--paper-raised); border: 1px solid var(--line); border-radius: 8px; padding: 10px 14px; font-size: 13px; color: var(--moss-deep); margin-bottom: 16px; }
  #vb-root .vb-policy-note a { color: var(--moss); font-weight: 600; text-decoration: underline; }
  #vb-root .vb-agree-row { display: flex; align-items: flex-start; gap: 8px; margin-top: 16px; }
  #vb-root .vb-agree-row input { width: auto; margin-top: 3px; }
  #vb-root .vb-agree-row label { margin: 0; font-size: 12px; font-weight: 500; color: var(--ink); }
  #vb-root .vb-agree-row a { color: var(--moss); font-weight: 600; text-decoration: underline; }
  #vb-root .vb-thumbs { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
  #vb-root .vb-thumb-item { position: relative; width: 72px; height: 72px; }
  #vb-root .vb-thumb-item img { width: 100%; height: 100%; object-fit: cover; border-radius: 6px; border: 1px solid var(--line); }
  #vb-root .vb-thumb-remove { position: absolute; top: -6px; right: -6px; width: 20px; height: 20px; border-radius: 50%; background: var(--brick); color: #fff; border: 2px solid var(--paper-raised); font-size: 12px; line-height: 1; cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 0; }
  #vb-root .vb-submit { margin-top: 18px; width: 100%; background: var(--moss); color: #fff; border: none; padding: 12px; border-radius: 8px; font-weight: 700; font-size: 14px; cursor: pointer; font-family: var(--font-body); }
  #vb-root .vb-submit:hover { background: var(--moss-deep); }
  #vb-root .vb-submit:disabled { background: #C7BFA9; cursor: not-allowed; }
  #vb-root .vb-msg { font-size: 13px; margin-top: 10px; padding: 10px 12px; border-radius: 8px; }
  #vb-root .vb-msg.ok { background: #EAF0E3; color: var(--moss-deep); }
  #vb-root .vb-msg.err { background: #F5E4DE; color: var(--brick); }
</style>
</head>
<body>

<div id="vb-root">
  <div class="vb-wrap">
    <p class="vb-eyebrow" id="vb-eyebrow"></p>
    <h1 id="vb-title"></h1>
    <div id="vb-policy-banner"></div>
    <div id="vb-book-tab"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function(){
  // ---- Edit these to configure the tool for your estate ----
  const CONFIG = {
    committeeLabel: "Lagos Homs Ilupeju Scheme",
    estateName: "Recreational Center Booking",
    // WhatsApp numbers of Finance Secretary & Assistant, who verify payment first.
    financeWhatsApp: [
      { name: "Financial Secretary", number: "2348000000001" },
      { name: "Financial Assistant", number: "2348000000002" }
    ],
    // Link to your Event Center Usage Policy (PDF hosted on Vercel, Google Drive, etc.)
    policyLink: "https://drive.google.com/file/d/1FMVoAn_Xc_iBfk2FU3aGxFWcCpLGnZIp/view?usp=sharing",
    // Supabase project connection
    supabaseUrl: "https://whgkvkzqqfwapbwudhat.supabase.co",
    supabaseKey: "sb_publishable_dGMPC9QZ2zEpLK0f6WzU8Q_-Hn3ikYG"
  };
  // -------------------------------------------------------------------

  const supabase = window.supabase.createClient(CONFIG.supabaseUrl, CONFIG.supabaseKey);

  function fromRow(r){
    return {
      date: r.date, name: r.name, phone: r.phone, email: r.email,
      eventType: r.event_type, notes: r.notes,
      paymentImages: r.payment_images || [], status: r.status,
      submittedAt: r.submitted_at, policyAgreedAt: r.policy_agreed_at,
      actionBy: r.action_by, actionAt: r.action_at
    };
  }
  function toRow(b){
    return {
      date: b.date, name: b.name, phone: b.phone, email: b.email,
      event_type: b.eventType, notes: b.notes,
      payment_images: b.paymentImages, status: b.status,
      submitted_at: b.submittedAt, policy_agreed_at: b.policyAgreedAt,
      action_by: b.actionBy || null, action_at: b.actionAt || null
    };
  }

  const root = document.getElementById('vb-root');
  const bookTab = document.getElementById('vb-book-tab');
  document.getElementById('vb-eyebrow').textContent = CONFIG.committeeLabel;
  document.getElementById('vb-title').textContent = CONFIG.estateName;
  document.getElementById('vb-policy-banner').innerHTML =
    `<div class="vb-policy-note">Before booking, please read our <a href="${CONFIG.policyLink}" target="_blank" rel="noopener">Event Center Usage Policy</a>.</div>`;

  let calMonth = new Date().getMonth();
  let calYear = new Date().getFullYear();
  let selectedDate = null;
  let bookingsCache = {};
  let paymentImages = [];

  function pad(n){ return n < 10 ? '0'+n : ''+n; }
  function dateKey(y,m,d){ return `${y}-${pad(m+1)}-${pad(d)}`; }
  function todayStr(){ const t = new Date(); return dateKey(t.getFullYear(), t.getMonth(), t.getDate()); }

  async function loadBookings(){
    try {
      const { data, error } = await supabase.from('bookings').select('*');
      if (error) throw error;
      bookingsCache = {};
      (data || []).forEach(row => { bookingsCache[row.date] = fromRow(row); });
    } catch(e) { console.error('Failed to load bookings', e); }
  }

  function statusOfDate(ds){ const b = bookingsCache[ds]; return b ? b.status : null; }

  function renderCalendar(){
    const monthNames = ["January","February","March","April","May","June","July","August","September","October","November","December"];
    const firstDay = new Date(calYear, calMonth, 1).getDay();
    const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
    let cells = '';
    for (let i=0;i<firstDay;i++) cells += `<div class="vb-day empty"></div>`;
    const today = todayStr();
    for (let d=1; d<=daysInMonth; d++){
      const ds = dateKey(calYear, calMonth, d);
      const isPast = ds < today;
      const status = statusOfDate(ds);
      let cls = 'vb-day';
      if (isPast) cls += ' past';
      if (ds === today) cls += ' today';
      if (status === 'approved') cls += ' approved';
      if (status === 'pending' || status === 'awaiting_welfare') cls += ' pending';
      if (ds === selectedDate) cls += ' selected';
      cells += `<div class="${cls}" data-date="${ds}" data-blocked="${isPast || status==='approved'}">${d}</div>`;
    }
    return `
      <div class="vb-cal-head">
        <button class="vb-nav-btn" id="vb-prev">‹</button>
        <div class="vb-cal-title">${monthNames[calMonth]} ${calYear}</div>
        <button class="vb-nav-btn" id="vb-next">›</button>
      </div>
      <div class="vb-dow">${['S','M','T','W','T','F','S'].map(d=>`<span>${d}</span>`).join('')}</div>
      <div class="vb-days">${cells}</div>
      <div class="vb-legend">
        <div class="vb-legend-item"><span class="vb-dot" style="background:var(--paper);border:1px solid var(--line)"></span>Open</div>
        <div class="vb-legend-item"><span class="vb-dot" style="background:var(--gold)"></span>Pending review</div>
        <div class="vb-legend-item"><span class="vb-dot" style="background:var(--brick)"></span>Booked</div>
      </div>
    `;
  }

  function renderBookForm(){
    const dateLabel = selectedDate
      ? new Date(selectedDate+'T00:00:00').toLocaleDateString('en-GB', { weekday:'long', day:'numeric', month:'long', year:'numeric' })
      : 'Pick a date on the calendar';
    return `
      <div class="vb-card">
        <label>Selected date</label>
        <div class="vb-selected-date">${dateLabel}</div>

        <label>Full name</label>
        <input type="text" id="vb-name" placeholder="e.g. Bola Adekunle">

        <label>WhatsApp number</label>
        <div class="vb-caption">Please enter a number we can reach you on WhatsApp</div>
        <input type="tel" id="vb-phone" placeholder="e.g. 080XXXXXXXX">

        <label>Email (optional)</label>
        <div class="vb-caption">We'll use this to send you a confirmation once approved</div>
        <input type="email" id="vb-email" placeholder="e.g. name@email.com">

        <label>Event type</label>
        <select id="vb-event-type">
          <option value="">Select one</option>
          <option>Birthday party</option>
          <option>Wedding / engagement</option>
          <option>Naming ceremony</option>
          <option>Meeting / seminar</option>
          <option>Other</option>
        </select>

        <label>Notes (optional)</label>
        <textarea id="vb-notes" placeholder="Expected guests, time, anything the committee should know"></textarea>

        <label>Proof of payment</label>
        <div class="vb-caption">Upload all receipts for this booking (you can add more than one)</div>
        <div class="vb-file-btn" id="vb-file-btn">Click to upload payment images</div>
        <input type="file" id="vb-file-input" accept="image/*" multiple style="display:none;">
        <div id="vb-thumbs" class="vb-thumbs"></div>

        <div class="vb-agree-row">
          <input type="checkbox" id="vb-agree">
          <label for="vb-agree">I have read and agree to the <a href="${CONFIG.policyLink}" target="_blank" rel="noopener">Event Center Usage Policy</a></label>
        </div>

        <button class="vb-submit" id="vb-submit-btn">Submit booking</button>
        <div id="vb-form-msg"></div>
      </div>
    `;
  }

  function renderBookTab(){
    bookTab.innerHTML = `<div class="vb-grid"><div class="vb-card">${renderCalendar()}</div>${renderBookForm()}</div>`;
    wireCalendarEvents(bookTab);
    wireFormEvents();
  }

  function wireCalendarEvents(container){
    const prev = container.querySelector('#vb-prev');
    const next = container.querySelector('#vb-next');
    if (prev) prev.onclick = () => { calMonth--; if (calMonth<0){calMonth=11;calYear--;} renderBookTab(); };
    if (next) next.onclick = () => { calMonth++; if (calMonth>11){calMonth=0;calYear++;} renderBookTab(); };
    container.querySelectorAll('.vb-day[data-date]').forEach(el => {
      el.onclick = () => {
        if (el.dataset.blocked === 'true') return;
        selectedDate = el.dataset.date;
        renderBookTab();
      };
    });
  }

  function compressImage(file){
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = e => {
        const img = new Image();
        img.onload = () => {
          const maxW = 800;
          const scale = Math.min(1, maxW / img.width);
          const canvas = document.createElement('canvas');
          canvas.width = img.width * scale;
          canvas.height = img.height * scale;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
          resolve(canvas.toDataURL('image/jpeg', 0.7));
        };
        img.onerror = reject;
        img.src = e.target.result;
      };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  function renderThumbs(){
    const container = document.getElementById('vb-thumbs');
    if (!container) return;
    container.innerHTML = paymentImages.map((src, i) => `
      <div class="vb-thumb-item">
        <img src="${src}">
        <button type="button" class="vb-thumb-remove" data-idx="${i}">×</button>
      </div>
    `).join('');
    container.querySelectorAll('.vb-thumb-remove').forEach(btn => {
      btn.onclick = () => {
        paymentImages.splice(Number(btn.dataset.idx), 1);
        renderThumbs();
        updateFileBtnLabel();
      };
    });
  }

  function updateFileBtnLabel(){
    const fileBtn = document.getElementById('vb-file-btn');
    if (!fileBtn) return;
    if (paymentImages.length === 0) {
      fileBtn.textContent = 'Click to upload payment images';
      fileBtn.classList.remove('has-file');
    } else {
      fileBtn.textContent = `${paymentImages.length} image${paymentImages.length > 1 ? 's' : ''} added — click to add more`;
      fileBtn.classList.add('has-file');
    }
  }

  function wireFormEvents(){
    const fileBtn = document.getElementById('vb-file-btn');
    const fileInput = document.getElementById('vb-file-input');
    fileBtn.onclick = () => fileInput.click();
    fileInput.onchange = async () => {
      const files = Array.from(fileInput.files || []);
      if (!files.length) return;
      fileBtn.textContent = 'Processing...';
      try {
        for (const file of files) {
          const dataUrl = await compressImage(file);
          paymentImages.push(dataUrl);
        }
        renderThumbs();
        updateFileBtnLabel();
      } catch(e) { fileBtn.textContent = 'Could not read one of those files, try again'; }
      fileInput.value = '';
    };
    document.getElementById('vb-submit-btn').onclick = submitBooking;
  }

  function showMsg(text, type){
    document.getElementById('vb-form-msg').innerHTML = `<div class="vb-msg ${type}">${text}</div>`;
  }

  async function submitBooking(){
    const btn = document.getElementById('vb-submit-btn');
    const name = document.getElementById('vb-name').value.trim();
    const phone = document.getElementById('vb-phone').value.trim();
    const email = document.getElementById('vb-email').value.trim();
    const eventType = document.getElementById('vb-event-type').value;
    const notes = document.getElementById('vb-notes').value.trim();

    if (!selectedDate) return showMsg('Pick a date on the calendar first.', 'err');
    if (!name || !phone || !eventType) return showMsg('Please fill in name, WhatsApp number, and event type.', 'err');
    if (paymentImages.length === 0) return showMsg('Please upload at least one payment image.', 'err');
    if (!document.getElementById('vb-agree').checked) return showMsg('Please confirm you have read the Event Center Usage Policy.', 'err');

    btn.disabled = true;
    btn.textContent = 'Submitting...';

    try {
      await loadBookings();
      const existing = bookingsCache[selectedDate];
      if (existing && existing.status === 'approved') {
        showMsg('Sorry, this date was just booked by someone else. Please pick another date.', 'err');
        btn.disabled = false; btn.textContent = 'Submit booking';
        renderBookTab();
        return;
      }
      const booking = {
        date: selectedDate, name, phone, email, eventType, notes,
        paymentImages: paymentImages.slice(), status: 'pending', submittedAt: new Date().toISOString(),
        policyAgreedAt: new Date().toISOString()
      };
      const result = await supabase.from('bookings').insert(toRow(booking));
      if (result.error) throw result.error;
      bookingsCache[selectedDate] = booking;

      const dateLabel = new Date(selectedDate+'T00:00:00').toLocaleDateString('en-GB', { day:'numeric', month:'long', year:'numeric' });
      const financeWaText = encodeURIComponent(
        `New venue booking awaiting payment verification:\nName: ${name}\nDate: ${dateLabel}\nEvent: ${eventType}\nPhone: ${phone}\n\nPlease check the committee dashboard to verify payment and approve or decline.`
      );
      const waButtons = CONFIG.financeWhatsApp.map(c => `<a href="https://wa.me/${c.number}?text=${financeWaText}" target="_blank" rel="noopener" class="vb-submit" style="display:block;text-align:center;text-decoration:none;margin-top:8px;background:#25D366;">Notify ${c.name} (Finance) on WhatsApp</a>`).join('');

      document.getElementById('vb-form-msg').innerHTML = `
        <div class="vb-msg ok">Booking submitted. Finance will verify your payment, then the Welfare Committee gives final approval.</div>
        ${waButtons}
      `;
      paymentImages = [];
    } catch(e) {
      console.error(e);
      showMsg('Something went wrong submitting your booking: ' + (e.message || 'please try again.'), 'err');
      btn.disabled = false;
      btn.textContent = 'Submit booking';
    }
  }

  loadBookings().then(renderBookTab);
})();
</script>
</body>
</html>
